<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
</head>
<body>
    <style>
        /* This styles the background of my button page */
        body{
            background-color: rgb(128, 211, 211);
        }
        .request-button{
            background-color: black;
            width: 150px;;
            color: white;
            border: none;
            margin-right: 8px;
            cursor: pointer;
            font-weight: bold;
            height: 36px;
            transition: opacity 0.5;
        }
        .request-button:hover{
            opacity: 0.8;
        }
        .request-button:active {
            opacity: 0.5;
        }      

        .add-to-cart-button{
            background-color: yellow;
            font-weight: bold;
            color: black;
            border: none;
            height: 36px;
            width: 150px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 13px;
            transition: opacity 0.15 ;
        }
        .add-to-cart-button:hover{
            background-color: rgb(214, 164, 25);
            color: black;
        }   

        .add-to-cart-button:active{
            opacity: 0.7;
        }
        .github-button{
            height: 36px;
            width: 150px;
            background-color: rgb(46, 164, 79);
            border-radius: 6px;
            font-weight: bold;
            color: white;
            font-size: 14px;
            cursor: pointer;
            width: 90px;
            border: none;
            margin-left: 8px;
            transition: opacity 0.15;
        }
        .github-button:hover{
            background-color: rgb(10, 63, 10);
        }

        .github-button:active{
            opacity: 0.7;
        }
    </style>
    <button class="request-button">Request</button>
    <button class="add-to-cart-button">Add to cart</button>
    <button class="github-button">Signup</button>
    <p><a href="../index.html">Home</a></p>
</body>
</html>
