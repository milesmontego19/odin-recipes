<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text project</title>
</head>
<body>
    <style>
        .tohama-font{
            color: black;
            border: none;
            padding-top: 10px;
            padding-bottom: 10px;
            font-size: 19px;
            font-family: Tahoma;
            font-weight: bold;
            padding-left: 16px;
            padding-right: 16px;
            margin: 0;
            text-align: center;
        }
        .sales-end{
            font-family: Arial;
            font-weight: bold;
            font-size: 15px;
            color: red;
            margin-top: 0;
            margin-bottom: 50px;
        

        }
        .font-arial{
            font-family: Arial;
            font-weight: bold;
             font-size: 20px;
             margin-bottom: 0;
        }
        .font-verdana{
            font-size: 18px;
            color: black;
            font-weight: bold;
            font-family: verdana;
            margin-bottom: 0px;

        }
        .beginner{
            font-size: 15x;
            font-family: verdana;
            color: rgb(54, 48, 48);
            margin-top: 0;
        }
        .course{
            width: 260px;
        }
        button{
            background-color: rgb(35, 124, 35);
            color: white;
            border: none;
            height: 36px;
            border-radius: 8px;
            padding-left: 12px;
            padding-right: 12px;
        }
        button:hover{
            background-color: rgb(5, 59, 5);
            cursor: pointer;
        }
        .span{
            color: rgb(73, 39, 224);
            text-align: center;
        }
        .span:hover{
            text-decoration: underline
        }
        .shopping{
            font-family: arial;
            font-weight: bold;
            font-size: 20px;
            text-align: center;
        }
        .apple{
            font-family: arial;
            font-weight: bold;
            text-align: center;
            font-size: 15px;
        }
    </style>
    <p class="tohama-font">This is Tohama Font</p>
    <p class="font-arial">Biggest Deals of the Year!</p>
    <p class="sales-end"><em>Sales end Tuesday</em></p>
    <p class="font-verdana">HTML CSS Course</p>
    <p class="beginner">Beginner to pro</p>
    <p class="course"><b>In this course, we'll learn  the skills you need to
        become a developer.</b></p>
     <p><button>Get Started</button></p> 
    <p class="shopping">Shopping for your business</p>   
    <p class="apple">See how Apple at work can help.</p>
    <p class="span">Learn more &#62;</p>
</body>
</html>
